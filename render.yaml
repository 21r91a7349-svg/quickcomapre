services:
  - type: web
    name: quickcompare-web
    env: docker
    region: singapore
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: quickcompare-db
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: AUTH_SECRET
        generateValue: true
      - key: AUTH_GOOGLE_ID
        sync: false
      - key: AUTH_GOOGLE_SECRET
        sync: false

databases:
  - name: quickcompare-db
    databaseName: quickcompare
    user: render_user
    plan: free
    region: singapore
